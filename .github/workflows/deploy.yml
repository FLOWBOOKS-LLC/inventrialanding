name: Deploy React frontend to Hostinger

# Builds with npm ci, then uploads dist/ to Hostinger over FTPS (secrets: FTP_*_MF).
on:
  push:
    branches:
      - mf
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # VITE_CALENDLY_URL comes from committed .env.production (public link). If an empty
      # GitHub secret were passed here, it would override the file and break Calendly in prod.
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: npm run build

      - name: List dist (debug)
        run: ls -la ./dist

      - name: Verify FTP secrets
        run: |
          if [ -z "${{ secrets.FTP_HOST_MF }}" ]; then echo "::error::FTP_HOST_MF is not set"; exit 1; fi
          if [ -z "${{ secrets.FTP_USERNAME_MF }}" ]; then echo "::error::FTP_USERNAME_MF is not set"; exit 1; fi
          if [ -z "${{ secrets.FTP_PASSWORD_MF }}" ]; then echo "::error::FTP_PASSWORD_MF is not set"; exit 1; fi
          echo "FTP secrets are present."

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST_MF }}
          username: ${{ secrets.FTP_USERNAME_MF }}
          password: ${{ secrets.FTP_PASSWORD_MF }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          # Hostinger: usually public_html for the site root (change if your panel shows a different path)
          server-dir: /
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

